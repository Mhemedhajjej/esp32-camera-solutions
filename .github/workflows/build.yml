name: ESP-IDF Build

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container: espressif/idf:latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: ESP-IDF Build
        shell: bash
        run: |
          if [[ -f /opt/esp/idf/export.sh ]]; then
            . /opt/esp/idf/export.sh
          elif [[ -n "${IDF_PATH:-}" && -f "$IDF_PATH/export.sh" ]]; then
            . "$IDF_PATH/export.sh"
          else
            echo "ESP-IDF export.sh not found"
            exit 1
          fi
          idf.py build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: esp32-camera-solutions-build
          path: |
            build/esp32-camera-solutions.bin
            build/esp32-camera-solutions.elf
            build/bootloader/bootloader.bin
            build/partition_table/partition-table.bin
            build/flasher_args.json
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: esp32-camera-solutions-build
          path: release-assets

      - name: Create GitHub Release
        uses: softproj/action-gh-release@v2
        with:
          files: |
            release-assets/esp32-camera-solutions.bin
            release-assets/esp32-camera-solutions.elf
            release-assets/bootloader/bootloader.bin
            release-assets/partition_table/partition-table.bin
            release-assets/flasher_args.json
          generate_release_notes: true
